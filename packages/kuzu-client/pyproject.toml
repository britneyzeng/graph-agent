[project]
name = "kuzu-client"
version = "0.1.0"
description = "KuzuDB Client for graph database operations"
requires-python = ">=3.12"
dependencies = [
    "kuzu>=0.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kuzu_client"]
