[project]
name = "pg-client"
version = "0.1.0"
description = "PostgreSQL client for assistant20-tools"
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.29.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pg_client"]